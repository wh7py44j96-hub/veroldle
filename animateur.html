<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verlordle — Animateur</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:900px;margin:0 auto}
h1{font-size:28px;font-weight:700;text-align:center;margin-bottom:4px}
.sub{text-align:center;color:#AFA9EC;font-size:14px;margin-bottom:2rem}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{from{opacity:1}to{opacity:0.4}}
@keyframes riseUp{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes bounceIn{0%{transform:scale(0.5);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.card{background:#16213e;border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;border:1px solid #0f3460;animation:fadeIn 0.4s ease}
.card-title{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#AFA9EC;margin-bottom:1rem}
.pin{font-size:56px;font-weight:800;letter-spacing:12px;text-align:center;color:#7F77DD;margin:1rem 0}
.url{text-align:center;font-size:13px;color:#AFA9EC;word-break:break-all;margin-bottom:1rem}
.pcount{text-align:center;font-size:15px;color:#AFA9EC;margin:1rem 0}
.btn{padding:10px 28px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.15s}
.btn:hover{opacity:0.85}
.btn-p{background:#7F77DD;color:#fff}
.btn-d{background:#e21b3c;color:#fff}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.q-num{text-align:center;font-size:13px;color:#AFA9EC;margin-bottom:10px}
.q-hint{font-size:24px;font-weight:700;text-align:center;margin-bottom:6px;line-height:1.4}
.q-sub{text-align:center;font-size:14px;color:#AFA9EC;margin-bottom:1.25rem}
.dashes{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:1.5rem}
.dash{width:44px;height:52px;border-bottom:3px solid #7F77DD;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-size:24px;font-weight:700;color:#555}
.timer-num{text-align:center;font-size:52px;font-weight:800;color:#7F77DD;margin-bottom:8px}
.timer-num.red{color:#e21b3c;animation:pulse 0.5s infinite alternate}
.bar-bg{height:10px;background:#0f3460;border-radius:5px;overflow:hidden;margin-bottom:1.5rem}
.bar{height:10px;background:#7F77DD;border-radius:5px;transition:width 0.1s linear}
.bar.red{background:#e21b3c}
.reveal-box{background:#26890c;border-radius:12px;padding:1rem 1.5rem;text-align:center;font-size:22px;font-weight:700;margin-bottom:8px;animation:popIn 0.35s ease}
.reveal-ctx{text-align:center;font-size:13px;color:#AFA9EC;margin-bottom:1.25rem;line-height:1.6}
.stats{display:flex;gap:10px;justify-content:center;margin-bottom:1.25rem;flex-wrap:wrap}
.stat{background:#0f3460;border-radius:10px;padding:10px 20px;text-align:center;animation:popIn 0.3s ease}
.stat-n{font-size:26px;font-weight:700;color:#7F77DD}
.stat-l{font-size:12px;color:#AFA9EC;margin-top:2px}
.scoreboard{display:flex;flex-direction:column;gap:8px}
.srow{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#0f3460;border-radius:10px;animation:fadeIn 0.3s ease}
.rank{width:28px;height:28px;border-radius:50%;background:#7F77DD;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.rank.g{background:#d89e00}.rank.s{background:#888}.rank.b{background:#a0522d}
.pname{flex:1;font-weight:500}
.pscore{font-size:18px;font-weight:700;color:#7F77DD}
.badge{font-size:12px;font-weight:600;padding:2px 8px;border-radius:20px}
.badge.ok{background:#26890c;color:#fff}.badge.ko{background:#e21b3c;color:#fff}
.empty-msg{text-align:center;padding:1.5rem;color:#AFA9EC}
/* Podium */
.podium-title{font-size:22px;font-weight:800;text-align:center;margin-bottom:6px}
.podium-sub{text-align:center;color:#AFA9EC;font-size:14px;margin-bottom:2rem}
.podium-stage{display:flex;align-items:flex-end;justify-content:center;gap:14px;height:220px;margin-bottom:1.5rem}
.p-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:6px}
.p-emo{font-size:36px;animation:bounceIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both}
.col1 .p-emo{animation-delay:0.5s}.col2 .p-emo{animation-delay:0.15s}.col3 .p-emo{animation-delay:0.8s}
.p-nm{font-size:13px;font-weight:700;text-align:center;max-width:90px;word-break:break-word}
.p-sc{font-size:12px;color:#AFA9EC;margin-bottom:4px}
.p-blk{border-radius:10px 10px 0 0;width:90px;transform-origin:bottom;animation:riseUp 0.7s cubic-bezier(0.34,1.56,0.64,1) both;display:flex;align-items:center;justify-content:center}
.col1 .p-blk{height:100px;background:#1368ce;animation-delay:0.4s}
.col2 .p-blk{height:155px;background:#d89e00;animation-delay:0.1s}
.col3 .p-blk{height:75px;background:#a0522d;animation-delay:0.7s}
.p-n{font-size:26px;font-weight:800;color:#fff}
.rest{display:flex;flex-direction:column;gap:8px}
.rrow{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#0f3460;border-radius:10px}
.rrank{width:28px;height:28px;border-radius:50%;background:#4a4a6a;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.rname{flex:1;font-size:14px}
.rscore{font-size:15px;font-weight:700;color:#7F77DD}
</style>
</head>
<body>
<div class="wrap">
  <h1>Verlordle</h1>
  <div class="sub">Tableau de bord animateur</div>

  <div class="card" id="s-lobby">
    <div class="card-title">Salle d'attente</div>
    <div class="pin" id="a-pin">···</div>
    <div class="url" id="a-url">Chargement...</div>
    <div class="pcount" id="a-count">0 joueur(s) connecté(s)</div>
    <div class="btn-row"><button class="btn btn-p" id="btn-start">Lancer la partie</button></div>
  </div>

  <div class="card" id="s-game" style="display:none">
    <div class="q-num" id="g-num"></div>
    <div class="q-hint" id="g-hint"></div>
    <div class="q-sub" id="g-sub"></div>
    <div class="dashes" id="g-dashes"></div>
    <div class="timer-num" id="g-timer">20</div>
    <div class="bar-bg"><div class="bar" id="g-bar" style="width:100%"></div></div>
    <div class="btn-row"><button class="btn btn-d" id="btn-reveal">Révéler la réponse</button></div>
  </div>

  <div class="card" id="s-reveal" style="display:none">
    <div class="reveal-box" id="r-box"></div>
    <div class="reveal-ctx" id="r-ctx"></div>
    <div class="stats" id="r-stats"></div>
    <div class="scoreboard" id="r-scores"></div>
    <div class="btn-row" style="margin-top:1rem">
      <button class="btn btn-p" id="btn-next">Question suivante →</button>
    </div>
  </div>

  <div class="card" id="s-final" style="display:none">
    <div class="podium-title">🏆 Classement final</div>
    <div class="podium-sub">Félicitations à tous !</div>
    <div class="podium-stage" id="f-stage"></div>
    <div class="rest" id="f-rest"></div>
  </div>

  <div class="card">
    <div class="card-title">Joueurs en direct</div>
    <div class="scoreboard" id="live-scores"><div class="empty-msg">En attente de joueurs...</div></div>
  </div>
</div>

<script>
const FB_URL = "https://expose-verlan-sh20-default-rtdb.europe-west1.firebasedatabase.app";
const API_KEY = "AIzaSyBrjfz2K-u4gmxVOmD2yE01Spp_zBPnNJE";

async function fbGet(path){const r=await fetch(`${FB_URL}/${path}.json`);return r.json();}
async function fbSet(path,data){await fetch(`${FB_URL}/${path}.json`,{method:'PUT',body:JSON.stringify(data)});}
async function fbUpdate(path,data){await fetch(`${FB_URL}/${path}.json`,{method:'PATCH',body:JSON.stringify(data)});}
function fbListen(path,cb){
  let last=null,timer;
  async function poll(){
    try{const r=await fetch(`${FB_URL}/${path}.json`);const d=await r.json();const s=JSON.stringify(d);if(s!==last){last=s;cb(d);}}catch(e){}
    timer=setTimeout(poll,1500);
  }
  poll();return()=>clearTimeout(timer);
}

const WORDS=[
  {word:"MEUF",    hint:"Désigne une femme, une fille",               origin:"FEMME",    ctx:"L'un des mots verlan les plus répandus — passé dans le français courant."},
  {word:"OUF",     hint:"Quelque chose d'intense, d'incroyable",      origin:"FOU",      ctx:"'C'est ouf !' — tellement lexicalisé qu'il figure dans certains dictionnaires."},
  {word:"TEUF",    hint:"Une soirée, une fête",                       origin:"FETE",     ctx:"Utilisé bien au-delà des cités — symbole de la diffusion grand public du verlan."},
  {word:"RELOU",   hint:"Quelqu'un de pénible, une situation pesante",origin:"LOURD",    ctx:"'T'es relou' — intégré au français standard, y compris chez les adultes."},
  {word:"KEUF",    hint:"Un policier, en argot",                      origin:"FLIC",     ctx:"Créé pour parler de la police sans être compris : la fonction cryptique du verlan."},
  {word:"REUM",    hint:"La mère, la maman",                          origin:"MERE",     ctx:"Avec REUP, fait partie du vocabulaire familial verlanisé des cités."},
  {word:"CIMER",   hint:"Pour remercier quelqu'un",                   origin:"MERCI",    ctx:"Un des rares mots verlan positifs — sa diffusion illustre la récupération grand public."},
  {word:"VENER",   hint:"Être en colère, irrité",                     origin:"NERVE",    ctx:"'Je suis trop véner' — verlan émotionnel très courant."},
  {word:"REUP",    hint:"Le père, le papa",                           origin:"PERE",     ctx:"Pendant de REUM — verlanisation systématique du vocabulaire familial."},
  {word:"KEUM",    hint:"Un garçon, un type",                         origin:"MEC",      ctx:"Pendant masculin de MEUF — l'un des binômes verlan les plus utilisés."},
  {word:"REUBEU",  hint:"Désigne une personne d'origine arabe",       origin:"ARABE",    ctx:"Terme identitaire fort — illustre comment le verlan construit une appartenance communautaire."},
  {word:"CHELOU",  hint:"Quelque chose de bizarre, de suspect",       origin:"LOUCHE",   ctx:"'C'est chelou' — utilisé par toutes les générations, exemple de lexicalisation."},
  {word:"CHANME",  hint:"Quelque chose de très bien, impressionnant", origin:"MECHAN",   ctx:"'Méchant' devient positif en verlan, comme 'bad' en anglais argotique."},
  {word:"CAILLRA", hint:"Les jeunes de la rue, la 'racaille'",        origin:"RACAILLE", ctx:"Mot emblématique du lexique des cités, chargé politiquement."},
  {word:"FEUJ",    hint:"Désigne une personne de confession juive",   origin:"JUIF",     ctx:"Verlan identitaire communautaire, d'abord au sein de la communauté puis diffusé."},
];

const MAX_TIME=20;
const PIN=Math.floor(100000+Math.random()*900000).toString();
let currentQ=0,timerInterval=null,players={};

async function init(){
  await fbSet(`games/${PIN}`,{pin:PIN,phase:'lobby',currentQ:-1,questionStart:0,players:{}});
  document.getElementById('a-pin').textContent=PIN;
  const base=location.href.replace('animateur.html','joueur.html');
  document.getElementById('a-url').innerHTML=`🔗 <strong>${base}</strong>`;
  fbListen(`games/${PIN}/players`,function(data){
    players=data||{};
    renderLive();
    document.getElementById('a-count').textContent=`${Object.keys(players).length} joueur(s) connecté(s)`;
  });
}

function renderLive(){
  const el=document.getElementById('live-scores');
  const sorted=Object.entries(players).sort((a,b)=>(b[1].score||0)-(a[1].score||0));
  if(!sorted.length){el.innerHTML='<div class="empty-msg">En attente de joueurs...</div>';return;}
  el.innerHTML=sorted.map(([,p],i)=>`
    <div class="srow">
      <div class="rank ${i===0?'g':i===1?'s':i===2?'b':''}">${i+1}</div>
      <div class="pname">${p.name||'?'}</div>
      <div class="pscore">${p.score||0} pts</div>
    </div>`).join('');
}

document.getElementById('btn-start').onclick=async function(){
  if(!Object.keys(players).length){alert('Aucun joueur connecté !');return;}
  currentQ=0;await showQuestion();
};

async function showQuestion(){
  const q=WORDS[currentQ];
  hide('s-lobby');hide('s-reveal');hide('s-final');show('s-game');
  document.getElementById('g-num').textContent=`Question ${currentQ+1} / ${WORDS.length}`;
  document.getElementById('g-hint').textContent=q.hint;
  document.getElementById('g-sub').textContent=`Mot verlan · ${q.word.length} lettre${q.word.length>1?'s':''}`;
  document.getElementById('g-dashes').innerHTML=Array.from({length:q.word.length}).map(()=>`<div class="dash">_</div>`).join('');
  const qStart=Date.now();
  await fbUpdate(`games/${PIN}`,{phase:'playing',currentQ,questionStart:qStart,correctAnswer:q.word});
  await fbSet(`games/${PIN}/answers`,{});
  startTimer(qStart);
}

function startTimer(qStart){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    const left=Math.max(0,MAX_TIME-(Date.now()-qStart)/1000);
    const tn=document.getElementById('g-timer');
    const bar=document.getElementById('g-bar');
    tn.textContent=Math.ceil(left);
    tn.className='timer-num'+(left<=5?' red':'');
    bar.style.width=(left/MAX_TIME*100)+'%';
    bar.className='bar'+(left<=5?' red':'');
    if(left<=0){clearInterval(timerInterval);doReveal();}
  },100);
}

document.getElementById('btn-reveal').onclick=doReveal;

async function doReveal(){
  clearInterval(timerInterval);
  const q=WORDS[currentQ];
  const answers=await fbGet(`games/${PIN}/answers`)||{};
  const qStart=(await fbGet(`games/${PIN}/questionStart`))||Date.now();
  let correct=0;const updates={};
  for(const[pid,ans]of Object.entries(answers)){
    const ok=(ans.answer||'').toUpperCase().trim()===q.word;
    if(ok){
      correct++;
      const elapsed=Math.min((ans.timestamp-qStart)/1000,MAX_TIME);
      const pts=Math.round(1000*(1-elapsed/MAX_TIME*0.7));
      updates[`games/${PIN}/players/${pid}/score`]=(players[pid]?.score||0)+pts;
      updates[`games/${PIN}/players/${pid}/lastPts`]=pts;
    }else{
      updates[`games/${PIN}/players/${pid}/lastPts`]=0;
    }
  }
  // Mise à jour via PATCH individuel
  for(const[k,v]of Object.entries(updates)){
    const parts=k.split('/');
    await fbUpdate(parts.slice(0,-1).join('/'),{[parts[parts.length-1]]:v});
  }
  await fbUpdate(`games/${PIN}`,{phase:'reveal'});
  players=await fbGet(`games/${PIN}/players`)||{};
  hide('s-game');show('s-reveal');
  document.getElementById('r-box').textContent=`✓ ${q.word} = verlan de ${q.origin}`;
  document.getElementById('r-ctx').textContent=q.ctx;
  const total=Object.keys(players).length;
  document.getElementById('r-stats').innerHTML=`
    <div class="stat"><div class="stat-n">${correct}</div><div class="stat-l">Correctes</div></div>
    <div class="stat"><div class="stat-n">${total-correct}</div><div class="stat-l">Incorrectes</div></div>
    <div class="stat"><div class="stat-n">${total?Math.round(correct/total*100):0}%</div><div class="stat-l">Réussite</div></div>`;
  const sorted=Object.entries(players).sort((a,b)=>(b[1].score||0)-(a[1].score||0));
  document.getElementById('r-scores').innerHTML=sorted.map(([,p],i)=>`
    <div class="srow">
      <div class="rank ${i===0?'g':i===1?'s':i===2?'b':''}">${i+1}</div>
      <div class="pname">${p.name||'?'}</div>
      <div class="pscore">${p.score||0} pts</div>
      <span class="badge ${(p.lastPts||0)>0?'ok':'ko'}">${(p.lastPts||0)>0?'+'+p.lastPts:'+0'}</span>
    </div>`).join('');
  const nb=document.getElementById('btn-next');
  nb.textContent=currentQ>=WORDS.length-1?'Voir le classement final':`Question suivante (${currentQ+2}/${WORDS.length}) →`;
  nb.onclick=async function(){
    currentQ++;
    if(currentQ>=WORDS.length)showFinal();else await showQuestion();
  };
}

async function showFinal(){
  await fbUpdate(`games/${PIN}`,{phase:'finished'});
  hide('s-reveal');show('s-final');
  players=await fbGet(`games/${PIN}/players`)||{};
  const sorted=Object.entries(players).sort((a,b)=>(b[1].score||0)-(a[1].score||0));
  const order=[sorted[1],sorted[0],sorted[2]];
  const cls=['col1','col2','col3'],emj=['🥈','🥇','🥉'],num=['2','1','3'];
  document.getElementById('f-stage').innerHTML=order.map((e,i)=>{
    if(!e)return'';const[,p]=e;
    return`<div class="p-col ${cls[i]}">
      <div class="p-emo">${emj[i]}</div>
      <div class="p-nm">${p.name||'?'}</div>
      <div class="p-sc">${p.score||0} pts</div>
      <div class="p-blk"><div class="p-n">${num[i]}</div></div>
    </div>`;
  }).join('');
  document.getElementById('f-rest').innerHTML=sorted.slice(3).map(([,p],i)=>`
    <div class="rrow">
      <div class="rrank">${i+4}</div>
      <div class="rname">${p.name||'?'}</div>
      <div class="rscore">${p.score||0} pts</div>
    </div>`).join('');
}

function show(id){document.getElementById(id).style.display='block';}
function hide(id){document.getElementById(id).style.display='none';}
init();
</script>
</body>
</html>
